    </circle>

    <circle r="5" fill="url(#rg)" opacity="0.4">
      <animateMotion dur="3s" repeatCount="indefinite" begin="5s" keyPoints="1;0" keyTimes="0;1" calcMode="linear"><mpath href="#r3"/></animateMotion>
    </circle>
    <circle r="1.5" fill="#ef4444">
