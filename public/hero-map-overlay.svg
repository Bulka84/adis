      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.5s" repeatCount="indefinite" begin="0s"/>
    </circle>

    <circle r="6" fill="url(#rg)" opacity="0.5">
      <animateMotion dur="4s" repeatCount="indefinite" begin="1.2s"><mpath href="#r5"/></animateMotion>
