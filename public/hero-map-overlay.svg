  <!-- Connection lines -->
  <g class="map-lines" stroke="#60a5fa" fill="none" opacity="0.12" stroke-width="0.7">
    <path id="r1" d="M250,390 L215,330"/>
    <path id="r2" d="M250,390 L195,358"/>
    <path id="r3" d="M250,390 L290,340"/>
    <path id="r4" d="M250,390 L232,405"/>
    <path id="r5" d="M250,390 L340,400"/>
    <path id="r6" d="M250,390 L290,418"/>
    <path id="r7" d="M340,400 L355,410"/>
    <path id="r8" d="M355,410 L370,410"/>
    <path id="r9" d="M340,400 L415,365"/>
    <path id="r10" d="M415,365 L425,388"/>
    <path id="r11" d="M415,365 L388,348"/>
    <path id="r12" d="M415,365 L445,345"/>
    <path id="r13" d="M445,345 L510,375"/>
    <path id="r14" d="M510,375 L565,360"/>
    <path id="r15" d="M565,360 L640,385"/>
    <path id="r16" d="M640,385 L790,365"/>
