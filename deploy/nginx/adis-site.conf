server {
    listen 80;
    server_name adis.example.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name adis.example.ru;

    ssl_certificate /etc/letsencrypt/live/adis.example.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adis.example.ru/privkey.pem;

    root /var/www/adis-website/out;
    index index.html;

    client_max_body_size 2m;

    # Next.js static export
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Static assets can be cached aggressively.
    location /_next/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /api/support/tickets {
        proxy_pass http://127.0.0.1:8000/api/support/tickets;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Если в bridge задан SITE_SHARED_TOKEN, впишите его сюда.
        # proxy_set_header X-Support-Token change_me_support_token;
    }

    location /api/max/ {
        proxy_pass http://127.0.0.1:8000/api/max/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

